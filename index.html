<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESS BRAND</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <div class="container nav-container">

    <a href="#" class="logo">MESS BRAND</a>

    <div class="nav-links">
      <a href="#products">Products</a>
      <a href="#order" class="order-nav">Order</a>
    </div>

  </div>
</nav>


<!-- ================= PRODUCTS ================= -->
<section id="products" class="products">
<div class="container">

<div class="products-grid">

<!-- PRODUCT -->
<div class="product-card">

    <div class="product-info">
        <h3 class="product-name">Denim Jacket</h3>

        <div class="product-actions">

            <!-- SIZES -->
            <div class="sizes">
                <button class="size-btn" data-size="S">S</button>
                <button class="size-btn" data-size="M">M</button>
                <button class="size-btn" data-size="L">L</button>
                <button class="size-btn" data-size="XL">XL</button>
            </div>

            <!-- ORDER -->
            <button class="order-btn" data-product="Denim Jacket">
                Order Now
            </button>

            <!-- WHATSAPP -->
            <a href="#" class="whatsapp-btn" data-product="Denim Jacket">
                WhatsApp
            </a>

        </div>
    </div>

</div>
<!-- END PRODUCT -->

</div>
</div>
</section>


<!-- ================= ORDER FORM ================= -->
<section id="order" class="order-section">
<div class="order-container">

<h2 class="section-title">Complete Your Order</h2>

<form id="orderForm" class="order-form">

    <div class="form-group full-width">
        <label>Product Name *</label>
        <input type="text" id="productName" name="productName" required>
    </div>

    <!-- SIZE (HIDDEN) -->
    <input type="hidden" id="productSize" name="productSize">

    <div class="form-row">

        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="fullName" required>
        </div>

        <div class="form-group">
            <label>Phone *</label>
            <input type="tel" name="phone" required>
        </div>

    </div>

    <div class="form-group full-width">
        <label>Address *</label>
        <input type="text" name="address" required>
    </div>

    <div class="form-group full-width">
        <label>Additional Notes</label>
        <textarea name="notes" rows="3"></textarea>
    </div>

    <button type="submit" class="submit-btn">
        Submit Order
    </button>

</form>

<div id="successMessage" class="success-message">
    <h3>✅ Order Sent Successfully!</h3>
    <button id="newOrderBtn">New Order</button>
</div>

</div>
</section>

<script src="script.js"></script>

</body>
</html>
