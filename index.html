<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESS BRAND</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <h1>MESS BRAND</h1>
</header>

<!-- ================= PRODUCTS ================= -->
<section class="products">

<div class="product-card">

    <div class="product-info">
        <h3>Denim Jacket</h3>

        <div class="product-actions">

            <!-- SIZE BUTTONS -->
            <div class="sizes">
                <button class="size-btn" data-size="S">S</button>
                <button class="size-btn" data-size="M">M</button>
                <button class="size-btn" data-size="L">L</button>
                <button class="size-btn" data-size="XL">XL</button>
            </div>

            <!-- ORDER BUTTON -->
            <button class="order-btn" data-product="Denim Jacket">
                Order Now
            </button>

            <!-- WHATSAPP -->
            <a href="https://wa.me/0673991904?text=Hello, I want to order Denim Jacket"
               class="whatsapp-btn"
               target="_blank">
               WhatsApp
            </a>

        </div>
    </div>

</div>

</section>

<!-- ================= ORDER FORM ================= -->
<section id="order" class="order-section">

<h2>Complete Your Order</h2>

<form id="orderForm">

    <div class="form-group full-width">
        <label>Product Name *</label>
        <input type="text" id="productName" name="productName" required>
    </div>

    <!-- HIDDEN SIZE -->
    <input type="hidden" id="productSize" name="productSize">

    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="fullName" required>
    </div>

    <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="phone" required>
    </div>

    <div class="form-group full-width">
        <label>Address *</label>
        <input type="text" name="address" required>
    </div>

    <!-- ONLY NOTES -->
    <div class="form-group full-width">
        <label>Additional Notes</label>
        <textarea id="notes"
                  name="notes"
                  rows="3"
                  placeholder="Additional notes (optional)..."></textarea>
    </div>

    <button type="submit" class="submit-btn">
        Submit Order
    </button>

</form>

<!-- SUCCESS MESSAGE -->
<div id="successMessage" style="display:none;">
    <h3>✅ Order Sent Successfully!</h3>
    <button id="newOrderBtn">New Order</button>
</div>

</section>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
