<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESS BRAND</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <div class="nav-container">

    <!-- LOGO -->
    <a href="#" class="logo">MESS BRAND</a>

    <!-- MENU -->
    <div class="nav-links">
      <a href="#products">Products</a>
      <a href="#order" class="order-nav">Order</a>
    </div>

  </div>
</nav>


<!-- ================= PRODUCTS ================= -->
<section id="products" class="products">

<div class="container">
<div class="products-grid">

    <!-- PRODUCT 1 -->
    <div class="product-card">

        <div class="product-info">
            <h3 class="product-name">Denim Jacket</h3>
            <p class="product-price">$49</p>

            <!-- SIZE BUTTONS -->
            <div class="sizes">
                <button class="size-btn" data-size="S">S</button>
                <button class="size-btn" data-size="M">M</button>
                <button class="size-btn" data-size="L">L</button>
                <button class="size-btn" data-size="XL">XL</button>
            </div>

            <div class="product-actions">

                <!-- ORDER -->
                <button class="order-btn" data-product="Denim Jacket">
                    Order Now
                </button>

                <!-- WHATSAPP -->
                <a href="#"
                   class="whatsapp-btn"
                   data-product="Denim Jacket">
                   WhatsApp
                </a>

            </div>
        </div>

    </div>
    <!-- END PRODUCT -->


</div>
</div>
</section>


<!-- ================= ORDER FORM ================= -->
<section id="order" class="order-section">

<div class="order-container">

<h2 class="section-title">Complete Your Order</h2>

<form id="orderForm">

    <!-- PRODUCT NAME -->
    <div class="form-group full-width">
        <label>Product Name *</label>
        <input type="text" id="productName" name="productName" required>
    </div>

    <!-- HIDDEN SIZE -->
    <input type="hidden" id="productSize" name="productSize">

    <!-- NAME -->
    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="fullName" required>
    </div>

    <!-- PHONE -->
    <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="phone" required>
    </div>

    <!-- ADDRESS -->
    <div class="form-group full-width">
        <label>Address *</label>
        <input type="text" name="address" required>
    </div>

    <!-- ADDITIONAL NOTES ONLY -->
    <div class="form-group full-width">
        <label>Additional Notes</label>
        <textarea
            id="notes"
            name="notes"
            rows="3"
            placeholder="Additional notes (optional)..."></textarea>
    </div>

    <button type="submit" class="submit-btn">
        Submit Order
    </button>

</form>

<!-- SUCCESS MESSAGE -->
<div id="successMessage" class="success-message">
    <h3>✅ Order Sent Successfully!</h3>
    <button id="newOrderBtn" class="cta-button">New Order</button>
</div>

</div>
</section>


<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
